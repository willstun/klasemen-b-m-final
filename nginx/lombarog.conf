# ================================================
# NGINX CONFIG - KLASEMEN LEADERBOARD SYSTEM
# ================================================
# Backend API     → localhost:4000
# Frontend        → localhost:3000
# Admin Dashboard → localhost:3001
#
# SETUP:
# 1. Ganti "domain.com" di bawah dengan domain Anda
# 2. Copy ke:  /etc/nginx/sites-available/klasemen
# 3. Symlink:  ln -sf /etc/nginx/sites-available/klasemen /etc/nginx/sites-enabled/
# 4. Test:     nginx -t
# 5. Reload:   systemctl reload nginx
#
# SSL: sudo certbot --nginx -d domain.com -d month.domain.com -d week.domain.com -d dash.domain.com
# ================================================

# ─── Upstreams ───────────────────────────────────────────

upstream backend {
    server 127.0.0.1:4000;
}

upstream frontend {
    server 127.0.0.1:3000;
}

upstream admin {
    server 127.0.0.1:3001;
}

# ─── HTTP → HTTPS Redirect ──────────────────────────────

server {
    listen 80;
    server_name domain.com *.domain.com;
    return 301 https://$host$request_uri;
}

# ─── Main Domain (blocked) ──────────────────────────────

server {
    listen 443 ssl;
    server_name domain.com www.domain.com;

    ssl_certificate /etc/letsencrypt/live/domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domain.com/privkey.pem;

    location / {
        return 500;
    }

    error_page 500 /500.html;
    location = /500.html {
        root /var/www/html;
        internal;
    }
}

# ─── month.domain.com → Frontend (Bulanan) ──────────────

server {
    listen 443 ssl;
    server_name month.domain.com;

    ssl_certificate /etc/letsencrypt/live/domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domain.com/privkey.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block admin/login/mingguan paths
    location ~* ^/(admin|login|mingguan) {
        return 404;
    }

    # Block admin API
    location /api/admin/ {
        return 403;
    }

    # API → Backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads → Backend (cache 7 days)
    location /uploads/ {
        proxy_pass http://backend;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Socket.io → Backend
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend pages
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static (cache 1 year)
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }
}

